name: Main Gate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi
      - name: Lint
        run: bash scripts/ci/lint.sh

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python dependencies
        run: uv sync
      - name: Schema Gate
        run: bash scripts/ci/schema_gate.sh

  full-tests:
    runs-on: ubuntu-latest
    needs: [lint, schema]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python dependencies
        run: uv sync
      - name: Full Test Suite
        run: uv run bash scripts/ci/test_full.sh

  # Building the full vLLM/torch closure from source takes multiple hours and
  # does not fit on GitHub-hosted runners, so CI only *evaluates* the flake
  # (catches syntax errors, missing attrs, unresolvable inputs). The real build
  # runs on a self-hosted builder or locally: `nix build .#closure`
  # (see .github/workflows/nix-build.yml for the manually-triggered build).
  nix-eval:
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Evaluate closure derivation (dry run, no build)
        run: |
          nix build .#closure --dry-run
          echo "Flake evaluates; closure derivation is well-formed."
