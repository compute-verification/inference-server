name: Main Gate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi
      - name: Lint
        run: bash scripts/ci/lint.sh

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python dependencies
        run: uv sync
      - name: Schema Gate
        run: bash scripts/ci/schema_gate.sh

  full-tests:
    runs-on: ubuntu-latest
    needs: [lint, schema]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python dependencies
        run: uv sync
      - name: Full Test Suite
        run: uv run bash scripts/ci/test_full.sh

  # Advisory: building the full vLLM/torch closure from source does not fit on
  # GitHub-hosted runners (multi-hour build, killed by the job timeout). Run it
  # on a self-hosted builder or locally with `nix build .#closure`.
  nix-closure:
    runs-on: ubuntu-latest
    needs: [lint]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build closure and verify digest
        run: |
          CLOSURE_PATH=$(nix build .#closure --print-out-paths --no-link)
          echo "Closure: ${CLOSURE_PATH}"
          DIGEST=$(nix path-info --json --recursive "${CLOSURE_PATH}" | python3 -c "
          import json, sys, hashlib
          data = json.load(sys.stdin)
          entries = [{'path': k, **v} for k, v in sorted(data.items())] if isinstance(data, dict) else sorted(data, key=lambda x: x.get('path', ''))
          print('sha256:' + hashlib.sha256(json.dumps(entries, sort_keys=True, separators=(',', ':')).encode()).hexdigest())
          ")
          echo "runtime_closure_digest=${DIGEST}"
